data_path: data/US_Accidents_March23.csv
output_root: outputs/runs
run_name: tabular_mlp
model_type: mlp
seed: 42
device: null

training:
  epochs: 30
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  early_stopping_patience: 10

model:
  hidden_dims: [128, 64]
  dropout: 0.3
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 256

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

preprocessing:
  max_missing_ratio: 0.5
  max_categorical_unique_ratio: 0.05
