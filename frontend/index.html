<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通事故损伤等级预测系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>交通事故损伤等级预测系统</h1>
            <p>基于机器学习的智能预测工具</p>
        </header>
        
        <main>
            <section class="form-section">
                <h2>输入事故参数</h2>
                <form id="prediction-form">
                    <div class="form-group">
                        <label for="start_lng">起始经度 (Start_Lng):</label>
                        <input type="number" id="start_lng" name="start_lng" step="0.0001" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="start_lat">起始纬度 (Start_Lat):</label>
                        <input type="number" id="start_lat" name="start_lat" step="0.0001" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="distance">事故距离 (Distance(mi)):</label>
                        <input type="number" id="distance" name="distance" step="0.01" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="junction">是否在路口 (Junction):</label>
                        <select id="junction" name="junction" required>
                            <option value="0">否</option>
                            <option value="1">是</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="weather_condition">天气状况 (Weather_Condition):</label>
                        <select id="weather_condition" name="weather_condition" required>
                            <option value="0">晴天</option>
                            <option value="1">多云</option>
                            <option value="2">雨天</option>
                            <option value="3">雪天</option>
                            <option value="4">雾天</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="temperature">温度 (Temperature(F)):</label>
                        <input type="number" id="temperature" name="temperature" step="0.1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="humidity">湿度 (Humidity(%)):</label>
                        <input type="number" id="humidity" name="humidity" min="0" max="100" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="pressure">气压 (Pressure(in)):</label>
                        <input type="number" id="pressure" name="pressure" step="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="visibility">能见度 (Visibility(mi)):</label>
                        <input type="number" id="visibility" name="visibility" step="0.1" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="wind_speed">风速 (Wind_Speed(mph)):</label>
                        <input type="number" id="wind_speed" name="wind_speed" step="0.1" min="0" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">预测损伤等级</button>
                </form>
            </section>
            
            <section class="result-section">
                <h2>预测结果</h2>
                <div id="result-container" class="result-container">
                    <p>请输入参数并点击预测按钮</p>
                </div>
                
                <div id="charts-wrapper" style="display: none; margin-top: 20px;">
                    <div id="prob-chart" style="width: 100%; height: 300px;"></div>
                    <div id="shap-chart" style="width: 100%; height: 400px; margin-top: 20px;"></div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 交通事故损伤等级预测系统</p>
        </footer>
    </div>
    
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
